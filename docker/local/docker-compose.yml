services:
  postgres:
    image: postgres:16-alpine
    container_name: beautica-postgres
    environment:
      POSTGRES_DB: beautica
      POSTGRES_USER: beautica
      POSTGRES_PASSWORD: beautica
    ports:
      - "5432:5432"
    volumes:
      - beautica-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beautica -d beautica"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - beautica-net

  pgadmin:
    image: dpage/pgadmin4
    container_name: beautica-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_SERVER_JSON_FILE: /pgadmin4/servers.json
    volumes:
      - ./pgadmin-servers.json:/pgadmin4/servers.json:ro
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - beautica-net

networks:
  beautica-net:
    driver: bridge

volumes:
  beautica-pgdata:
