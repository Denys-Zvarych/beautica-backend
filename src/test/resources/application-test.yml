# Test profile — placeholder values so Spring context loads without real infrastructure
spring:
  main:
    allow-bean-definition-overriding: true
    banner-mode: "off"
  datasource:
    # Overridden at runtime by Testcontainers @ServiceConnection
    url: jdbc:postgresql://localhost:5432/beautica_test
    username: test
    password: test
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  mail:
    host: localhost
    port: 25
    username: test
    password: test
    test-connection: false
    properties:
      '[mail.smtp.connectiontimeout]': 1000
      '[mail.smtp.timeout]': 1000
      '[mail.smtp.writetimeout]': 1000

app:
  rate-limit:
    register-capacity: 100000
    login-capacity: 100000
    refresh-capacity: 100000
    slots-capacity: 100000
    device-token-capacity: 100000
    media-upload-capacity: 100000
    verify-email-capacity: 100000
    resend-verification-capacity: 100000
    forgot-password-capacity: 100000
    reset-password-capacity: 100000
  jwt:
    # Unit tests that wire JwtTokenProvider directly use TestConstants.TEST_JWT_SECRET (different value);
    # integration tests loaded via this profile use the placeholder below. Keep both in sync.
    secret: ${JWT_SECRET:test-jwt-secret-placeholder-min-32-bytes-testonly}
    access-token-expiration: 900000
    refresh-token-expiration: 604800000
  cloudflare-r2:
    access-key-id: test
    secret-access-key: test
    bucket: test-bucket
    endpoint: http://localhost:9000
  firebase:
    service-account: test
  frontend:
    base-url: http://localhost:3000
  invite:
    token-expiration-hours: 72
    from-email: noreply@beautica.app
  admin-email: admin@beautica.test
  security:
    # Test profile only — fixed 32+ char value so the context loads under `test`.
    otp-pepper: test-otp-pepper-fixed-value-min-32-characters
  verification:
    cumulative-failure-threshold: 10
    lockout-duration: 15m
    stale-code-retention: 24h
  password-reset:
    cleanup-retention: 7d
  outbox:
    # Test profile only — Base64 of 32 zero bytes; integration tests don't exercise real ciphertext content.
    payload-key: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=

management:
  health:
    mail:
      enabled: false
