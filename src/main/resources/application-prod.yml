# Production profile — all values injected via environment variables (Railway)
spring:
  jpa:
    show-sql: false

  flyway:
    enabled: true

server:
  port: ${PORT:8080}
  error:
    include-stacktrace: never
    include-message: never
    include-binding-errors: never

logging:
  level:
    root: INFO
    com.beautica: INFO

# Explicitly disable OpenAPI / Swagger in production — base config sets these false,
# but repeating here prevents a sibling profile from accidentally re-enabling them.
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

