# Production profile — all values injected via environment variables (Railway)
spring:
  jpa:
    show-sql: false

  flyway:
    enabled: true

# One-shot Flyway self-heal for applied-migration checksum drift.
# Bound by FlywayRepairConfig (@Profile("prod")) to a guarded flyway.repair()
# before migrate(). Default false == Spring Boot default behaviour (migrate only).
# Set Railway env FLYWAY_REPAIR_ON_MIGRATE=true for ONE boot to recover from a
# "Migration checksum mismatch" crash, then REMOVE it — leaving it on would mask
# a genuinely dangerous future edit to an already-applied migration.
beautica:
  flyway:
    repair-on-migrate: ${FLYWAY_REPAIR_ON_MIGRATE:false}

server:
  port: ${PORT:8080}
  error:
    include-stacktrace: never
    include-message: never
    include-binding-errors: never

logging:
  level:
    root: INFO
    com.beautica: INFO

# Explicitly disable OpenAPI / Swagger in production — base config sets these false,
# but repeating here prevents a sibling profile from accidentally re-enabling them.
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# Override the base application.yml default for FRONTEND_BASE_URL.
# Base config has `${FRONTEND_BASE_URL:http://localhost:3000}` for local dev convenience;
# in prod we deliberately omit the default so a missing env var fails the app at
# property-resolution time (IllegalArgumentException at startup) instead of silently
# emitting invite links that point at localhost.
app:
  frontend:
    base-url: ${FRONTEND_BASE_URL}

