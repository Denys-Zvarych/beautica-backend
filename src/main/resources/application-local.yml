spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/beautica
    username: beautica
    password: beautica
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=200,expireAfterWrite=60m

  mail:
    host: localhost
    port: 1025
    username: ""
    password: ""
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

app:
  jwt:
    secret: Ys9eSVVCRjTO8UIMW36Gj5mEuJVPtYRL1cja0XG5JnL+Fdv2osHaBqnP+NXX1hUm      # generate: openssl rand -base64 48
    access-token-expiration: 900000
    refresh-token-expiration: 604800000
  cloudflare-r2:
    access-key-id: local
    secret-access-key: local
    bucket: beautica-media
    endpoint: http://localhost:9000
  firebase:
    service-account: ""
  frontend:
    base-url: http://localhost:3000
  invite:
    token-expiration-hours: 48
    from-email: noreply@beautica.app
  admin-email: ${ADMIN_EMAIL:dev-admin@localhost}

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
