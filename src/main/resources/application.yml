spring:
  application:
    name: beautica-backend

  datasource:
    url: ${DATABASE_URL}
    driver-class-name: org.postgresql.Driver
    hikari:
      keepalive-time: 120000
      idle-timeout: 300000
      minimum-idle: 2
      maximum-pool-size: 10
      connection-timeout: 30000

  threads:
    virtual:
      enabled: true

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  cache:
    type: caffeine

  mail:
    host: smtp-relay.brevo.com
    port: 587
    username: ${BREVO_SMTP_LOGIN}
    password: ${BREVO_SMTP_KEY}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8080
  # forward-headers-strategy is intentionally omitted (defaults to 'none').
  # Setting it to 'native' would cause Spring's ForwardedHeaderFilter to strip
  # X-Forwarded-For before AuthRateLimitFilter runs, making IP-based rate limiting
  # ineffective. The raw XFF header is read directly by AuthRateLimitFilter.

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: INFO
    com.beautica: INFO
    org.springframework: WARN
    org.hibernate: WARN
    org.flywaydb: INFO

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration: 900000       # 15 min in ms
    refresh-token-expiration: 604800000   # 7 days in ms
  cloudflare-r2:
    access-key-id: ${CLOUDFLARE_R2_ACCESS_KEY_ID}
    secret-access-key: ${CLOUDFLARE_R2_SECRET_ACCESS_KEY}
    bucket: ${CLOUDFLARE_R2_BUCKET:beautica-media}
    endpoint: ${CLOUDFLARE_R2_ENDPOINT}
  firebase:
    service-account: ${FIREBASE_SERVICE_ACCOUNT}
  frontend:
    base-url: ${FRONTEND_BASE_URL:http://localhost:3000}
  invite:
    token-expiration-hours: 48
    from-email: noreply@beautica.app
  admin-email: ${ADMIN_EMAIL}
