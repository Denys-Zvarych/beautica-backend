spring:
  application:
    name: beautica-backend

  datasource:
    url: ${DATABASE_URL}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  mail:
    host: smtp.sendgrid.net
    port: 587
    username: apikey
    password: ${SENDGRID_API_KEY}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration: 900000       # 15 min in ms
    refresh-token-expiration: 2592000000  # 30 days in ms
  cloudflare-r2:
    access-key-id: ${CLOUDFLARE_R2_ACCESS_KEY_ID}
    secret-access-key: ${CLOUDFLARE_R2_SECRET_ACCESS_KEY}
    bucket: ${CLOUDFLARE_R2_BUCKET:beautica-media}
    endpoint: ${CLOUDFLARE_R2_ENDPOINT}
  firebase:
    service-account: ${FIREBASE_SERVICE_ACCOUNT}
  frontend:
    base-url: ${FRONTEND_BASE_URL:http://localhost:3000}
