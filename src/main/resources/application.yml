spring:
  application:
    name: beautica-backend

  datasource:
    url: ${DATABASE_URL}
    driver-class-name: org.postgresql.Driver
    hikari:
      keepalive-time: 120000
      max-lifetime: 1200000
      idle-timeout: 300000
      minimum-idle: 2              # Low startup footprint on Railway 512MB; pool grows on demand
      maximum-pool-size: 10        # Neon free tier hard ceiling — do not raise without a plan upgrade
      connection-timeout: 20000    # Fail faster under pool saturation; 30s was masking exhaustion (was 30000)
      leak-detection-threshold: 10000  # Alert on connections held > 10 s — indicates a blocking or long-running query

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    web:
      pageable:
        max-page-size: 100

  cache:
    type: caffeine

  thymeleaf:
    cache: true   # explicit — prevents accidental cache=false if a sibling profile adds thymeleaf.* keys

  threads:
    virtual:
      enabled: true

  servlet:
    multipart:
      # Image uploads are bounded at 10 MB; oversized requests are rejected by the container
      # before reaching the controller layer, so MediaService never sees an unbounded stream.
      max-file-size: 10MB
      max-request-size: 10MB
      # Explicit temp directory avoids platform-specific default locations on non-Railway hosts.
      location: ${java.io.tmpdir}/beautica-uploads

  mail:
    host: smtp-relay.brevo.com
    port: 587
    username: ${BREVO_SMTP_LOGIN}
    password: ${BREVO_SMTP_KEY}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 10000
          writetimeout: 10000

server:
  port: 8080
  # forward-headers-strategy is intentionally omitted (defaults to 'none').
  # Setting it to 'native' would cause Spring's ForwardedHeaderFilter to strip
  # X-Forwarded-For before AuthRateLimitFilter runs, making IP-based rate limiting
  # ineffective. The raw XFF header is read directly by AuthRateLimitFilter.
  tomcat:
    # Swallow up to 10 MB of an oversized request body so Tomcat returns a clean 413
    # rather than aborting the TCP connection mid-stream. Matches the multipart cap above.
    max-swallow-size: 10MB

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: INFO
    com.beautica: INFO
    org.springframework: WARN
    org.hibernate: WARN
    org.flywaydb: INFO

springdoc:
  api-docs:
    path: /api-docs
    enabled: false
  swagger-ui:
    path: /swagger-ui.html
    enabled: false

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration: 900000       # 15 min in ms
    refresh-token-expiration: 604800000   # 7 days in ms
  cloudflare-r2:
    # Master kill-switch. When false (default), S3Config does NOT register an S3Client bean and
    # R2StorageService (Phase 7.4) will run in stub-safe mode. Set R2_ENABLED=true only when all
    # four CLOUDFLARE_R2_* env vars below are populated; S3Config fails fast otherwise.
    enabled: ${R2_ENABLED:false}
    account-id: ${CLOUDFLARE_R2_ACCOUNT_ID:}
    access-key-id: ${CLOUDFLARE_R2_ACCESS_KEY_ID:}
    secret-access-key: ${CLOUDFLARE_R2_SECRET_ACCESS_KEY:}
    bucket: ${CLOUDFLARE_R2_BUCKET:beautica-media}
    endpoint: ${CLOUDFLARE_R2_ENDPOINT:}
    public-url: ${CLOUDFLARE_R2_PUBLIC_URL:}
  firebase:
    service-account: ${FIREBASE_SERVICE_ACCOUNT:}
  frontend:
    base-url: ${FRONTEND_BASE_URL:http://localhost:3000}
  invite:
    token-expiration-hours: 48
    from-email: noreply@beautica.app
  admin-email: ${ADMIN_EMAIL:admin@beautica.app}
  security:
    # Keyed HMAC-SHA256 pepper for the 6-digit verification OTP. Distinct from
    # JWT_SECRET. Generate: openssl rand -base64 32. Empty default forces every
    # profile to supply a value or fail fast at startup (>= 32 chars required).
    otp-pepper: ${APP_OTP_PEPPER:}
  verification:
    # Resend-surviving cumulative brute-force bound: after this many lifetime
    # failed verifies (NOT reset by resend) the account is locked for
    # lockout-duration. A couple of honest mistakes + a resend never trips it.
    cumulative-failure-threshold: 10
    lockout-duration: 15m
    # Abandoned unverified OTP rows older than this are nulled by the daily sweep.
    stale-code-retention: 24h
  password-reset:
    # Reset tokens expired longer than this are hard-deleted by the daily sweep
    # (PasswordResetTokenCleanupJob) — keeps password_reset_tokens from growing
    # unbounded. A few days of buffer past the 1 h TTL for support/forensic lookup.
    cleanup-retention: 7d
  rate-limit:
    # Per-IP cap for POST/DELETE /api/v1/devices/token (60 s window).
    # Other capacities (login/refresh/slots) use @Value defaults in RateLimitConfig.
    device-token-capacity: 30
    # POST/DELETE /api/v1/media/* — 10/min per IP; balances upload retries
    # (after a 400 on wrong MIME / oversize) with abuse prevention.
    media-upload-capacity: 10
    # POST /api/v1/auth/forgot-password — 3/hr per IP (60-min window).
    # Email-bomb surface; kept low. Decoupled from reset-password so a NAT-shared
    # client spamming forgot-password cannot lock out their own reset-confirm.
    forgot-password-capacity: 3
    # POST /api/v1/auth/reset-password — 10/hr per IP (60-min window).
    # Sends no email; higher cap tolerates legitimate new-password typo retries
    # against a single emailed token.
    reset-password-capacity: 10
  outbox:
    # Base64-encoded 32-byte (AES-256) symmetric key for OutboxPayloadCipher.
    # Generate with: openssl rand -base64 32
    # Empty default forces every profile (incl. test) to provide a value or fail fast at startup.
    payload-key: ${OUTBOX_PAYLOAD_KEY:}
