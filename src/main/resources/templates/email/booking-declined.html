<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uk">
<head>
    <meta charset="UTF-8"/>
    <title>Бронювання відхилено</title>
</head>
<body style="font-family:sans-serif;color:#222;max-width:600px;margin:0 auto;padding:24px;">
    <h2 style="color:#d32f2f;">Бронювання відхилено</h2>
    <p>Вітаємо, <strong th:text="${clientName}">Клієнт</strong>!</p>
    <p>На жаль, ваше бронювання було відхилено.</p>
    <table style="border-collapse:collapse;width:100%;margin:16px 0;">
        <tr>
            <td style="padding:8px 12px;background:#f5f5f5;font-weight:bold;width:40%;">Послуга</td>
            <td style="padding:8px 12px;" th:text="${serviceName}">Назва послуги</td>
        </tr>
        <tr th:if="${comment != null and !#strings.isEmpty(comment)}">
            <td style="padding:8px 12px;background:#f5f5f5;font-weight:bold;">Причина</td>
            <td style="padding:8px 12px;" th:text="${comment}">Причина відхилення</td>
        </tr>
    </table>
    <p>Спробуйте обрати інший час або послугу на Beautica.</p>
    <p style="color:#888;font-size:13px;">Це автоматичне повідомлення від Beautica.</p>
</body>
</html>
