<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uk">
<head><meta charset="UTF-8"/></head>
<body style="margin:0;background:#0D0906;font-family:Arial,Helvetica,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
    <tr><td align="center" style="padding:32px;">
      <table role="presentation" width="480" cellpadding="0" cellspacing="0"
             style="background:#1a1410;border-radius:16px;padding:40px;">

        <!-- Logo — CID inline attachment, 64px rendered height -->
        <tr><td align="center" style="padding-bottom:24px;">
          <img src="cid:beauticaLogo"
               alt="Beautica"
               width="64" height="64"
               style="display:block;border:0;outline:none;"/>
        </td></tr>

        <tr><td style="color:#F5EDE0;font-size:22px;font-weight:700;padding-bottom:16px;">
          Скидання паролю
        </td></tr>
        <tr><td style="color:#B89A7A;font-size:15px;line-height:1.6;padding-bottom:24px;">
          Ми отримали запит на скидання паролю для вашого акаунту Beautica.
          Натисніть кнопку нижче, щоб встановити новий пароль.
        </td></tr>
        <tr><td align="center" style="padding:16px 0 24px;">
          <a th:href="${resetUrl}"
             style="display:inline-block;background:#6A4A28;color:#F5EDE0;
                    text-decoration:none;font-size:16px;font-weight:700;
                    padding:16px 32px;border-radius:12px;">
            Скинути пароль
          </a>
        </td></tr>
        <tr><td style="color:#B89A7A;font-size:13px;padding-bottom:8px;">
          Посилання дійсне протягом 1 години.
        </td></tr>
        <tr><td style="color:#6b5b4a;font-size:12px;padding-top:16px;">
          Якщо ви не запитували скидання паролю, проігноруйте цей лист.
          Ваш пароль залишиться незмінним.
        </td></tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
