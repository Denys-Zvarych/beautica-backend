<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uk">
<head>
    <meta charset="UTF-8"/>
    <title>Клієнт скасував бронювання</title>
</head>
<body style="font-family:sans-serif;color:#222;max-width:600px;margin:0 auto;padding:24px;">
    <h2 style="color:#e65100;">Клієнт скасував бронювання</h2>
    <p>Вітаємо, <strong th:text="${masterName}">Майстер</strong>!</p>
    <p>Клієнт скасував бронювання. Детальна інформація:</p>
    <table style="border-collapse:collapse;width:100%;margin:16px 0;">
        <tr>
            <td style="padding:8px 12px;background:#f5f5f5;font-weight:bold;width:40%;">Клієнт</td>
            <td style="padding:8px 12px;" th:text="${clientName}">Ім'я клієнта</td>
        </tr>
        <tr>
            <td style="padding:8px 12px;background:#f5f5f5;font-weight:bold;">Послуга</td>
            <td style="padding:8px 12px;" th:text="${serviceName}">Назва послуги</td>
        </tr>
        <tr>
            <td style="padding:8px 12px;background:#f5f5f5;font-weight:bold;">Дата та час</td>
            <td style="padding:8px 12px;" th:text="${startsAt}">10:00, 20 травня 2026</td>
        </tr>
        <tr th:if="${comment != null and !#strings.isEmpty(comment)}">
            <td style="padding:8px 12px;background:#f5f5f5;font-weight:bold;">Причина</td>
            <td style="padding:8px 12px;" th:text="${comment}">Причина скасування</td>
        </tr>
    </table>
    <p style="color:#888;font-size:13px;">Це автоматичне повідомлення від Beautica.</p>
</body>
</html>
