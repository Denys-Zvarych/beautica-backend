            local name="$1"
            local base="${name##*/}"
            case "$base" in
              V*__*.sql) : ;;
              *) printf '' ; return 0 ;;
            esac
            local ver="${base#V}"
            ver="${ver%%__*}"
            case "$ver" in
              ''|*[!0-9._]*) printf '' ; return 0 ;;
            esac
