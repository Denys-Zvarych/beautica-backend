name: Migration Immutability

on:
  pull_request:
    branches:
      - main
      - dev

jobs:
  check-migration-immutability:
    name: Check Migration Immutability
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # REQUIRED: full history so the three-dot merge-base diff
          # ("$BASE_SHA...HEAD") can resolve. Do not lower this.
          fetch-depth: 0

      - name: Detect modified or deleted migrations
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail

          MIGRATION_PATH="src/main/resources/db/migration"

          # >>> SHARED-BLOCK:immutability:BEGIN
          # =========================================================
          # SHARED IMMUTABILITY GATE LOGIC -- keep this block
          # BYTE-IDENTICAL with the mirror in
          # `self-test-immutability-gate`. The hermetic
          # `verify-gate-mirror-parity` job diffs the two extracted
          # copies and fails CI if they drift, so a typo or a dropped
          # filter letter in one place is caught before it can ship.
          # =========================================================
          #
          # Collect files that are Modified (M), Deleted (D), Renamed
          # (R), Copied (C), or Type-changed (T) relative to the PR
          # merge-base. The three-dot form ("$base_sha...HEAD") diffs
          # against the merge-base of the two tips rather than the raw
          # base tip, so advances on the base branch never attribute
          # base-side mutations to this PR.  Added (A) files are
          # intentionally excluded so brand-new migrations always pass.
          # Renamed migrations are caught because Flyway uses the
          # script name as part of its checksum identity -- a rename
          # changes that identity and will fail validation in prod.
          # C and T are practically unreachable for text V*.sql
          # migrations but are included for defensive completeness
          # (zero behaviour change for normal new-file adds).
          run_gate() {
            local base_sha="$1"
            local changed
            changed=$(git diff --name-status --diff-filter=MDRCT "${base_sha}...HEAD" -- "$MIGRATION_PATH")
            if [ -z "$changed" ]; then
              return 0
            fi
            return 1
          }
          # =========================================================
          # END SHARED IMMUTABILITY GATE LOGIC
          # =========================================================
          # >>> SHARED-BLOCK:immutability:END

          CHANGED=$(git diff --name-status --diff-filter=MDRCT "$BASE_SHA...HEAD" -- "$MIGRATION_PATH")

          if run_gate "$BASE_SHA"; then
            echo "No existing migration files were modified, deleted, or renamed. Check passed."
            exit 0
          fi

          echo "ERROR: The following already-merged Flyway migration file(s) were modified, deleted, or renamed:"
          echo ""
          echo "$CHANGED"
          echo ""
          echo "Applied/merged migrations are immutable -- never edit or rename V*.sql after it is merged."
          echo "Add a new forward migration with the next version number instead."
          echo "If you did NOT touch the file(s) listed above, rebase your branch onto the base branch to bring your history up to date."
          exit 1

  self-test-immutability-gate:
    name: Self-test Immutability Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Assert gate fails on mutation and passes on clean / add-only
        run: |
          set -euo pipefail

          MIGRATION_PATH="src/main/resources/db/migration"

          # >>> SHARED-BLOCK:immutability:BEGIN
          # =========================================================
          # SHARED IMMUTABILITY GATE LOGIC -- keep this block
          # BYTE-IDENTICAL with the mirror in
          # `self-test-immutability-gate`. The hermetic
          # `verify-gate-mirror-parity` job diffs the two extracted
          # copies and fails CI if they drift, so a typo or a dropped
          # filter letter in one place is caught before it can ship.
          # =========================================================
          #
          # Collect files that are Modified (M), Deleted (D), Renamed
          # (R), Copied (C), or Type-changed (T) relative to the PR
          # merge-base. The three-dot form ("$base_sha...HEAD") diffs
          # against the merge-base of the two tips rather than the raw
          # base tip, so advances on the base branch never attribute
          # base-side mutations to this PR.  Added (A) files are
          # intentionally excluded so brand-new migrations always pass.
          # Renamed migrations are caught because Flyway uses the
          # script name as part of its checksum identity -- a rename
          # changes that identity and will fail validation in prod.
          # C and T are practically unreachable for text V*.sql
          # migrations but are included for defensive completeness
          # (zero behaviour change for normal new-file adds).
          run_gate() {
            local base_sha="$1"
            local changed
            changed=$(git diff --name-status --diff-filter=MDRCT "${base_sha}...HEAD" -- "$MIGRATION_PATH")
            if [ -z "$changed" ]; then
              return 0
            fi
            return 1
          }
          # =========================================================
          # END SHARED IMMUTABILITY GATE LOGIC
          # =========================================================
          # >>> SHARED-BLOCK:immutability:END

          WORK="$(mktemp -d)"
          cd "$WORK"
          git init -q
          git config user.email "ci@example.com"
          git config user.name "CI Self Test"

          mkdir -p "$MIGRATION_PATH"
          printf 'CREATE TABLE existing (id int);\n' > "$MIGRATION_PATH/V1__existing.sql"
          printf 'CREATE TABLE other (id int);\n' > "$MIGRATION_PATH/V2__other.sql"
          git add -A
          git commit -q -m "base: existing migrations"
          BASE_SHA="$(git rev-parse HEAD)"
          git switch -q -c feature

          fail() { echo "SELF-TEST FAILED: $1"; exit 1; }

          # --- Scenario 1: clean diff (no migration changes) -> exit 0 ---
          git commit -q --allow-empty -m "no migration changes"
          run_gate "$BASE_SHA" || fail "clean diff should pass (exit 0)"
          echo "OK: clean diff passes"
          git reset -q --hard "$BASE_SHA"

          # --- Scenario 2: pure add of a new migration -> exit 0 ---
          printf 'CREATE TABLE new_table (id int);\n' > "$MIGRATION_PATH/V3__new.sql"
          git add -A && git commit -q -m "add new migration"
          run_gate "$BASE_SHA" || fail "add-only diff should pass (exit 0)"
          echo "OK: add-only diff passes"
          git reset -q --hard "$BASE_SHA"

          # --- Scenario 3: MODIFY an existing migration -> exit 1 ---
          printf 'CREATE TABLE existing (id int, extra text);\n' > "$MIGRATION_PATH/V1__existing.sql"
          git add -A && git commit -q -m "modify existing migration"
          if run_gate "$BASE_SHA"; then fail "modified migration should fail (exit 1)"; fi
          echo "OK: modified migration fails"
          git reset -q --hard "$BASE_SHA"

          # --- Scenario 4: DELETE an existing migration -> exit 1 ---
          # Exercises the 'D' filter letter explicitly. Scenario 5 (a
          # real rename) yields 'R', not 'D', so this scenario is the
          # sole dedicated 'D' coverage and must stay.
          git rm -q "$MIGRATION_PATH/V1__existing.sql"
          git commit -q -m "delete existing migration"
          if run_gate "$BASE_SHA"; then fail "deleted migration should fail (exit 1)"; fi
          echo "OK: deleted migration fails"
          git reset -q --hard "$BASE_SHA"

          # --- Scenario 5: real RENAME (status 'R') of an existing
          # migration -> exit 1 ---
          # `git config diff.renames true` makes git emit a true 'R'
          # status (instead of the config-less D+A pair, which would
          # only ever exercise the 'D' path and silently leave the 'R'
          # filter letter untested). This scenario genuinely exercises
          # the 'R' letter in --diff-filter=MDRCT. Identical file
          # content + a pure path change is the textbook rename git
          # detects as R100.
          git config diff.renames true
          git mv "$MIGRATION_PATH/V1__existing.sql" "$MIGRATION_PATH/V1__existing_renamed.sql"
          git commit -q -m "rename existing migration"
          # Sanity: prove git actually reports an 'R' status here, so a
          # future git/config change that downgrades it to D+A is loud.
          git diff --name-status --diff-filter=R "$BASE_SHA...HEAD" -- "$MIGRATION_PATH" \
            | grep -q '^R' || fail "scenario 5 expected a real 'R' status but git produced none"
          if run_gate "$BASE_SHA"; then fail "renamed migration should fail (exit 1)"; fi
          echo "OK: real renamed (R) migration fails"
          git config --unset diff.renames
          git reset -q --hard "$BASE_SHA"

          # --- Scenario 6: COPY (status 'C') of an existing migration
          # -> exit 1 ---
          # `git config diff.renames copies` enables copy detection.
          # NOTE: a *pure* copy of an unmodified file is reported by
          # `git diff` (without the expensive --find-copies-harder,
          # which the gate deliberately does NOT pass) as a plain 'A'
          # add -- and that is intentionally allowed: a duplicated-
          # content file under a NEW Flyway version is a legitimate new
          # migration; version collisions are the monotonicity job's
          # concern, not immutability's. git only emits a real 'C'
          # status with the default diff when the copy SOURCE is also
          # modified. So this scenario copies an existing migration AND
          # mutates the original in the same commit: the gate then sees
          # both 'M' (the source mutation) and 'C100', genuinely
          # exercising the 'C' filter letter, and must fail (exit 1).
          git config diff.renames copies
          cp "$MIGRATION_PATH/V1__existing.sql" "$MIGRATION_PATH/V1__existing_copy.sql"
          printf 'CREATE TABLE existing (id int, copied text);\n' > "$MIGRATION_PATH/V1__existing.sql"
          git add -A && git commit -q -m "copy existing migration AND modify the source"
          # Sanity: prove git actually reports a 'C' status here using
          # the SAME diff invocation the gate uses (no --find-copies-
          # harder), so a future git/config change is loud.
          git diff --name-status --diff-filter=C "$BASE_SHA...HEAD" -- "$MIGRATION_PATH" \
            | grep -q '^C' || fail "scenario 6 expected a real 'C' status but git produced none"
          if run_gate "$BASE_SHA"; then fail "copied migration should fail (exit 1)"; fi
          echo "OK: copied (C) migration fails"
          git config --unset diff.renames
          git reset -q --hard "$BASE_SHA"

          # --- Scenario 7: TYPE-CHANGE (status 'T') of an existing
          # migration -> exit 1 ---
          # Replace an existing regular-file V*.sql with a symlink of
          # the same name. git reports this as a 'T' (type changed)
          # status. Exercises the 'T' filter letter.
          rm "$MIGRATION_PATH/V1__existing.sql"
          ln -s /dev/null "$MIGRATION_PATH/V1__existing.sql"
          git add -A && git commit -q -m "type-change existing migration to symlink"
          # Sanity: prove git actually reports a 'T' status here.
          git diff --name-status --diff-filter=T "$BASE_SHA...HEAD" -- "$MIGRATION_PATH" \
            | grep -q '^T' || fail "scenario 7 expected a real 'T' status but git produced none"
          if run_gate "$BASE_SHA"; then fail "type-changed migration should fail (exit 1)"; fi
          echo "OK: type-changed (T) migration fails"
          git reset -q --hard "$BASE_SHA"

          # --- Scenario 8: MIXED add + modify in one commit -> exit 1 ---
          # A single commit that adds a brand-new V*.sql AND edits an
          # already-merged one. Proves a legitimate new migration does
          # NOT mask a co-located mutation of an existing migration.
          printf 'CREATE TABLE mixed_new (id int);\n' > "$MIGRATION_PATH/V4__mixed_new.sql"
          printf 'CREATE TABLE existing (id int, mixed text);\n' > "$MIGRATION_PATH/V1__existing.sql"
          git add -A && git commit -q -m "add new migration AND modify existing in one commit"
          if run_gate "$BASE_SHA"; then fail "mixed add+modify should fail (exit 1)"; fi
          echo "OK: mixed add+modify fails (new add does not mask the modify)"
          git reset -q --hard "$BASE_SHA"

          echo "All self-test scenarios passed."

  check-migration-version-monotonicity:
    name: Check Migration Version Monotonicity
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # REQUIRED: full history so the three-dot merge-base diff
          # ("$BASE_SHA...HEAD") and "git ls-tree $BASE_SHA" can resolve.
          # Do not lower this.
          fetch-depth: 0

      - name: Enforce monotonic, non-duplicate Flyway versions
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail

          MIGRATION_PATH="src/main/resources/db/migration"

          # >>> SHARED-BLOCK:monotonicity:BEGIN
          # =========================================================
          # SHARED PARSE+GATE LOGIC -- keep this block BYTE-IDENTICAL
          # with the mirror in `self-test-version-monotonicity-gate`
          # so a typo or semantic drift in one place is caught by the
          # hermetic self-test before it can ship. The hermetic
          # `verify-gate-mirror-parity` job diffs the two extracted
          # copies and fails CI if they drift.
          # =========================================================
          #
          # Parse a Flyway *versioned* migration filename into a
          # normalized, zero-padded, dot-joined numeric key suitable
          # for plain string comparison.  Flyway version grammar:
          # leading 'V', then the version, then '__', then the
          # description.  Within the version, '.' and '_' are
          # interchangeable segment separators (V2_1 == V2.1) and each
          # segment is a non-negative integer.  Every segment is
          # zero-padded to 10 digits, so a lexical compare of two keys
          # equals Flyway's numeric, segment-wise ordering -- this is
          # exactly what makes V9 (...0009) sort BEFORE V10 (...0010)
          # instead of the wrong lexical "10" < "9".  Repeatable (R__)
          # and any non-versioned file yields an empty key so callers
          # skip it (Flyway does not order repeatables by version).
          parse_version_key() {
            local name="$1"
            local base="${name##*/}"
            case "$base" in
              V*__*.sql) : ;;
              *) printf '' ; return 0 ;;
            esac
            local ver="${base#V}"
            ver="${ver%%__*}"
            case "$ver" in
              ''|*[!0-9._]*) printf '' ; return 0 ;;
            esac
            local key="" seg pad rest="$ver"
            rest="${rest//_/.}"
            local IFS=.
            for seg in $rest; do
              [ -z "$seg" ] && seg=0
              # ACCEPTED LIMITATION (INFO): "10#$seg" forces base-10 so
              # a leading-zero segment is not parsed as octal. It still
              # overflows a 64-bit signed integer for a >=19-digit (and
              # certainly any >=26-digit) segment. Unreachable for real
              # Flyway versions, which are small integers -- documented,
              # not silently relied upon.
              printf -v pad '%010d' "$((10#$seg))"
              key="${key}.${pad}"
            done
            printf '%s' "${key#.}"
          }

          # Run the monotonicity + duplicate gate for a merge-base SHA.
          # Pure git + shell, NO database.  Returns 0 on pass, 1 on
          # violation, and prints a developer-facing diagnostic naming
          # the offending file(s) and the conflicting/blocking version.
          run_version_gate() {
            local base_sha="$1"
            local added_file added_key blocking_key="" blocking_file=""
            local violations=0 k

            # Highest migration version already present at the
            # merge-base (the state that is effectively already
            # merged on the base branch).
            while IFS= read -r f; do
              [ -z "$f" ] && continue
              k="$(parse_version_key "$f")"
              [ -z "$k" ] && continue
              if [ -z "$blocking_key" ] || [ "$k" \> "$blocking_key" ]; then
                blocking_key="$k"
                blocking_file="$f"
              fi
            done <<EOF
          $(git ls-tree -r --name-only "$base_sha" -- "$MIGRATION_PATH" 2>/dev/null || true)
          EOF

            # Files ADDED on this branch relative to the merge-base.
            # Use --name-only (no status column) so filenames containing
            # whitespace are NOT truncated by an awk field split -- a
            # migration added as 'V5__has space.sql' must still reach
            # parse_version_key intact and be evaluated by the gate.
            # ACCEPTED LIMITATION (INFO): --name-only would still split
            # on an *embedded newline* inside a filename (the read loop
            # is newline-delimited). Unreachable for Flyway filenames,
            # whose grammar forbids newlines -- documented, not relied
            # upon silently.
            local added_list
            added_list="$(git diff --name-only --diff-filter=A "${base_sha}...HEAD" -- "$MIGRATION_PATH")"

            # (1)+(2) Monotonicity: every newly-added version must be
            # strictly greater than the highest already-merged version.
            while IFS= read -r added_file; do
              [ -z "$added_file" ] && continue
              added_key="$(parse_version_key "$added_file")"
              [ -z "$added_key" ] && continue
              if [ -n "$blocking_key" ] && { [ "$added_key" \< "$blocking_key" ] || [ "$added_key" = "$blocking_key" ]; }; then
                echo "ERROR: new migration '$added_file' has a version <= the highest"
                echo "       already-merged migration. Flyway runs with out-of-order"
                echo "       DISABLED, so this would fail 'flyway validate' at app startup."
                echo "       blocked by already-merged: '$blocking_file'"
                echo "       Renumber your migration ABOVE the current highest version."
                violations=1
              fi
            done <<EOF
          $added_list
          EOF

            # (3) No duplicate versions across the full HEAD set
            # (existing + newly added). Two files mapping to the same
            # parsed version key collide in Flyway's version space.
            local dup
            dup="$(
              git ls-tree -r --name-only HEAD -- "$MIGRATION_PATH" 2>/dev/null \
                | while IFS= read -r f; do
                    [ -z "$f" ] && continue
                    k="$(parse_version_key "$f")"
                    [ -z "$k" ] && continue
                    printf '%s\t%s\n' "$k" "$f"
                  done \
                | sort \
                | awk -F'\t' '{ if ($1==prev) { print prevf; print $2 } prev=$1; prevf=$2 }' \
                | sort -u
            )"
            if [ -n "$dup" ]; then
              echo "ERROR: two Flyway migrations share the same parsed version:"
              echo "$dup"
              echo "       Each migration version must be unique."
              violations=1
            fi

            return "$violations"
          }
          # =========================================================
          # END SHARED PARSE+GATE LOGIC
          # =========================================================
          # >>> SHARED-BLOCK:monotonicity:END

          if run_version_gate "$BASE_SHA"; then
            echo "Flyway migration versions are monotonic and unique. Check passed."
            exit 0
          fi

          echo ""
          echo "Out-of-order or duplicate Flyway migration version detected."
          echo "Flyway in this project validates with out-of-order DISABLED;"
          echo "an out-of-order or duplicate version passes file-immutability"
          echo "but FAILS 'flyway validate' on the next deploy."
          echo "Rebase onto the base branch and renumber above the highest version."
          exit 1

  self-test-version-monotonicity-gate:
    name: Self-test Version Monotonicity Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Assert version gate fails on out-of-order / duplicate and passes on clean / new-highest
        run: |
          set -euo pipefail

          MIGRATION_PATH="src/main/resources/db/migration"

          # >>> SHARED-BLOCK:monotonicity:BEGIN
          # =========================================================
          # SHARED PARSE+GATE LOGIC -- keep this block BYTE-IDENTICAL
          # with the mirror in `self-test-version-monotonicity-gate`
          # so a typo or semantic drift in one place is caught by the
          # hermetic self-test before it can ship. The hermetic
          # `verify-gate-mirror-parity` job diffs the two extracted
          # copies and fails CI if they drift.
