            fi

            return "$violations"
          }
          # =========================================================
          # END SHARED PARSE+GATE LOGIC
          # =========================================================
          # >>> SHARED-BLOCK:monotonicity:END

          WORK="$(mktemp -d)"
          cd "$WORK"
          git init -q
          git config user.email "ci@example.com"
          git config user.name "CI Self Test"

          mkdir -p "$MIGRATION_PATH"
          printf 'CREATE TABLE a (id int);\n' > "$MIGRATION_PATH/V1__a.sql"
          printf 'CREATE TABLE b (id int);\n' > "$MIGRATION_PATH/V9__b.sql"
          printf 'CREATE TABLE c (id int);\n' > "$MIGRATION_PATH/V10__c.sql"
          git add -A
          git commit -q -m "base: V1, V9, V10 (max merged = V10)"
          BASE_SHA="$(git rev-parse HEAD)"
          git switch -q -c feature

          fail() { echo "SELF-TEST FAILED: $1"; exit 1; }

          # --- Scenario 1: clean diff (no migration changes) -> pass ---
          git commit -q --allow-empty -m "no migration changes"
          run_version_gate "$BASE_SHA" >/dev/null || fail "clean diff should pass (exit 0)"
          echo "OK: clean diff passes"
          git reset -q --hard "$BASE_SHA"

          # --- Scenario 2: new HIGHEST version (V11) -> pass ---
          printf 'CREATE TABLE d (id int);\n' > "$MIGRATION_PATH/V11__d.sql"
          git add -A && git commit -q -m "add V11"
          run_version_gate "$BASE_SHA" >/dev/null || fail "new highest version should pass (exit 0)"
          echo "OK: new highest version (V11) passes"
          git reset -q --hard "$BASE_SHA"

          # --- Scenario 3: new version LOWER than merged max (V5 < V10) -> fail ---
          printf 'CREATE TABLE e (id int);\n' > "$MIGRATION_PATH/V5__e.sql"
          git add -A && git commit -q -m "add V5 behind merged V10"
          if run_version_gate "$BASE_SHA" >/dev/null; then fail "version <= merged max should fail (exit 1)"; fi
          echo "OK: lower version (V5 < merged V10) fails"
          git reset -q --hard "$BASE_SHA"

          # --- Scenario 4: new version EQUAL to merged max (V10) -> fail ---
          printf 'CREATE TABLE f (id int);\n' > "$MIGRATION_PATH/V10__dup.sql"
          git add -A && git commit -q -m "add V10 duplicate"
          if run_version_gate "$BASE_SHA" >/dev/null; then fail "duplicate of merged max should fail (exit 1)"; fi
          echo "OK: duplicate version (V10 == merged V10) fails"
          git reset -q --hard "$BASE_SHA"

          # --- Scenario 5: numeric (not lexical) ordering V9 vs V10 ---
          # Lexically "9" > "10"; numerically 9 < 10. A genuinely new
          # V9 added after merged V10 must FAIL -> proves numeric compare.
          git rm -q "$MIGRATION_PATH/V9__b.sql"
          git commit -q -m "drop V9 so the re-add is a genuine add"
          printf 'CREATE TABLE g (id int);\n' > "$MIGRATION_PATH/V9__g.sql"
          git add -A && git commit -q -m "re-add V9 after merged V10 exists"
          if run_version_gate "$BASE_SHA" >/dev/null; then fail "V9 after merged V10 must fail numerically (exit 1)"; fi
          echo "OK: numeric ordering enforced (V9 < V10, not lexical)"
          git reset -q --hard "$BASE_SHA"

          # --- Scenario 6: two NEW files above max sharing a version -> fail ---
          printf 'x\n' > "$MIGRATION_PATH/V20__x.sql"
          printf 'y\n' > "$MIGRATION_PATH/V20__y.sql"
          git add -A && git commit -q -m "two new files both V20"
          if run_version_gate "$BASE_SHA" >/dev/null; then fail "two new files sharing a version should fail (exit 1)"; fi
          echo "OK: duplicate among newly-added files fails"
          git reset -q --hard "$BASE_SHA"

          # --- Scenario 7: dotted/underscore version above max (V10_1) -> pass ---
          printf 'z\n' > "$MIGRATION_PATH/V10_1__patch.sql"
          git add -A && git commit -q -m "add V10_1 patch (> V10)"
          run_version_gate "$BASE_SHA" >/dev/null || fail "V10_1 (> V10) should pass (exit 0)"
          echo "OK: dotted version V10_1 > V10 passes"
          git reset -q --hard "$BASE_SHA"

          # --- Scenario 8: non-versioned repeatable migration added -> pass ---
          printf 'r\n' > "$MIGRATION_PATH/R__refresh_view.sql"
          git add -A && git commit -q -m "add repeatable migration"
          run_version_gate "$BASE_SHA" >/dev/null || fail "repeatable (R__) migration should be ignored (exit 0)"
          echo "OK: repeatable (R__) migration ignored"
          git reset -q --hard "$BASE_SHA"

          # --- Scenario 9: spaced filename out-of-order (V5 < V10) -> fail ---
          # A filename containing a space must NOT be truncated by the
          # added-file extraction; it must reach parse_version_key whole
          # so an out-of-order spaced migration still FAILS the gate.
          printf 'CREATE TABLE h (id int);\n' > "$MIGRATION_PATH/V5__has space.sql"
          git add -A && git commit -q -m "add spaced V5 behind merged V10"
          if run_version_gate "$BASE_SHA" >/dev/null; then fail "spaced out-of-order migration must fail (exit 1)"; fi
          echo "OK: spaced out-of-order migration (V5__has space.sql < V10) fails"
          git reset -q --hard "$BASE_SHA"

          # --- Scenario 10: underscore<->dot equivalence collision -> fail ---
          # V20_1 and V20.1 normalize to the SAME parsed key (the
          # '_'->'.' rewrite is load-bearing). Both are above merged max
          # so monotonicity alone would pass; the duplicate-detection
          # arm must still FAIL them as a version-space collision.
          printf 'p\n' > "$MIGRATION_PATH/V20_1__a.sql"
          printf 'q\n' > "$MIGRATION_PATH/V20.1__b.sql"
          git add -A && git commit -q -m "V20_1 and V20.1 collide after normalization"
          if run_version_gate "$BASE_SHA" >/dev/null; then fail "underscore/dot equivalence collision must fail (exit 1)"; fi
          echo "OK: V20_1 vs V20.1 normalization collision fails"
          git reset -q --hard "$BASE_SHA"

          # --- Scenario 11: undo migration (U*) added -> pass/ignored ---
          # Undo migrations are not version-ordered by Flyway's forward
          # validate path; parse_version_key only matches 'V*__*.sql',
          # so a 'U*__*.sql' yields an empty key and is skipped. Pins
          # the "undo not version-ordered" contract alongside R__ (8).
          printf 'u\n' > "$MIGRATION_PATH/U10__undo_c.sql"
          git add -A && git commit -q -m "add undo migration U10"
          run_version_gate "$BASE_SHA" >/dev/null || fail "undo (U*) migration should be ignored (exit 0)"
          echo "OK: undo (U*) migration ignored"
          git reset -q --hard "$BASE_SHA"

          # --- Scenario 12: first-ever migration on an empty base -> pass ---
          # Build a SECOND base with NO migration directory at all, then
          # add the very first V1 migration. With no already-merged
          # version there is no blocking_key, so the first migration
          # must PASS.
          EMPTY_WORK="$(mktemp -d)"
          (
            cd "$EMPTY_WORK"
            git init -q
            git config user.email "ci@example.com"
            git config user.name "CI Self Test"
            git commit -q --allow-empty -m "empty base: no migration dir"
            EMPTY_BASE="$(git rev-parse HEAD)"
            git switch -q -c feature
            mkdir -p "$MIGRATION_PATH"
            printf 'CREATE TABLE first (id int);\n' > "$MIGRATION_PATH/V1__first.sql"
            git add -A && git commit -q -m "add first-ever migration V1"
            run_version_gate "$EMPTY_BASE" >/dev/null || fail "first-ever migration on empty base should pass (exit 0)"
          )
          echo "OK: first-ever migration on an empty base passes"
          rm -rf "$EMPTY_WORK"

          # --- Scenario 13: new-highest + modify-existing in same PR ->
          # version gate PASSES ---
          # Monotonicity is ORTHOGONAL to immutability. A PR that adds a
          # new highest version (V11) while also editing an existing
          # migration (V1) must PASS the *version* gate -- the edit is
          # the immutability job's concern, not this one. This pins that
          # separation of duties so a future change does not accidentally
          # couple the two gates.
          printf 'CREATE TABLE k (id int);\n' > "$MIGRATION_PATH/V11__k.sql"
          printf 'CREATE TABLE a (id int, extra text);\n' > "$MIGRATION_PATH/V1__a.sql"
          git add -A && git commit -q -m "add new highest V11 AND modify existing V1"
          run_version_gate "$BASE_SHA" >/dev/null || fail "new-highest + modify-existing must PASS the version gate (orthogonal to immutability)"
          echo "OK: new-highest + modify-existing passes the version gate (orthogonal to immutability)"
          git reset -q --hard "$BASE_SHA"

          echo "All version-monotonicity self-test scenarios passed."

  verify-gate-mirror-parity:
    name: Verify Gate <-> Mirror Parity
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Assert every SHARED block is byte-identical across gate and mirror
        run: |
          set -euo pipefail

          WF=".github/workflows/migration-immutability.yml"

          # Extract every region delimited by the sentinel markers
          # "# >>> SHARED-BLOCK:<id>:BEGIN" / ":END" for a given <id>.
          # awk prints the lines strictly BETWEEN the two marker lines
          # (markers excluded), and concatenates every occurrence of
          # that <id> in file order. The two production/mirror copies
          # therefore extract as one stream each pairing collapses to.
          # We then split that stream back into the N occurrences and
          # diff occurrence #1 vs #2. There are exactly two occurrences
          # of each id (the production gate and its self-test mirror).
          extract_occurrence() {
            local id="$1" want="$2"
            awk -v id="$id" -v want="$want" '
              $0 ~ ("# >>> SHARED-BLOCK:" id ":BEGIN") { n++; cap=(n==want?1:0); next }
              $0 ~ ("# >>> SHARED-BLOCK:" id ":END")   { if (n==want) exit; cap=0; next }
              cap { print }
            ' "$WF"
          }

          check_pair() {
            local id="$1"
            local a b count
            count="$(grep -c "# >>> SHARED-BLOCK:${id}:BEGIN" "$WF")"
            if [ "$count" -ne 2 ]; then
              echo "PARITY FAILED: expected exactly 2 '${id}' SHARED blocks, found ${count}"
              exit 1
            fi
            a="$(mktemp)"; b="$(mktemp)"
            extract_occurrence "$id" 1 > "$a"
            extract_occurrence "$id" 2 > "$b"
            if [ ! -s "$a" ] || [ ! -s "$b" ]; then
              echo "PARITY FAILED: extracted an empty '${id}' SHARED block"
              exit 1
            fi
            if ! diff -u "$a" "$b"; then
              echo "PARITY FAILED: '${id}' gate block differs from its self-test mirror."
              echo "The SHARED block must be BYTE-IDENTICAL across the production"
              echo "job and its hermetic mirror. Re-sync the two copies."
              exit 1
            fi
            echo "OK: '${id}' SHARED block is byte-identical across gate and mirror"
          }

          check_pair immutability
          check_pair monotonicity

          echo "All SHARED gate<->mirror blocks are byte-identical."
