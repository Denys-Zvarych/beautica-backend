name: PR Validate

on:
  pull_request:
    branches:
      - main
      - dev

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build
        run: ./gradlew build -x test
        env:
          DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}         # placeholder
          JWT_SECRET: ${{ secrets.JWT_SECRET }}                   # placeholder
          CLOUDFLARE_R2_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}   # placeholder
          CLOUDFLARE_R2_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }} # placeholder
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}         # placeholder
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}       # placeholder

      - name: Run tests
        run: ./gradlew test
        env:
          DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}         # placeholder
          JWT_SECRET: ${{ secrets.JWT_SECRET }}                   # placeholder
          CLOUDFLARE_R2_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}   # placeholder
          CLOUDFLARE_R2_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }} # placeholder
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}         # placeholder
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}       # placeholder

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: build/reports/tests/
          retention-days: 7
